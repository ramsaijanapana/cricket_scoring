services:
  # Primary transactional DB + event source log
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cricket_postgres
    environment:
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: cricket_dev
      POSTGRES_DB: cricket_scoring
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Live score cache, WebSocket pub/sub, sessions
  redis:
    image: redis:7-alpine
    container_name: cricket_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
