services:
  # Primary transactional DB + event source log
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cricket_postgres
    environment:
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: cricket_dev
      POSTGRES_DB: cricket_scoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Live score cache, WebSocket pub/sub, sessions
  redis:
    image: redis:7-alpine
    container_name: cricket_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Analytics OLAP — billion-row ball data with millisecond aggregation
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: cricket_clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: cricket
      CLICKHOUSE_PASSWORD: cricket_dev
      CLICKHOUSE_DB: cricket_analytics

  # Event bus — ball event streaming to consumers
  kafka:
    image: bitnami/kafka:3.7
    container_name: cricket_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  kafka_data:
